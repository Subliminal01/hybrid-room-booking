services:
  - type: web
    name: hybrid-room-booking-api
    runtime: docker
    plan: free
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health/ready
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: AUTH_SECRET_KEY
        generateValue: true
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 60
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: 30
      - key: BOOKING_HOLD_MINUTES
        value: 30
      - key: AUTH_RATE_LIMIT_PER_MINUTE
        value: 120
      - key: TRUST_PROXY_HEADERS
        value: 1
      - key: UPLOAD_DIR
        value: uploads
      - key: MAX_UPLOAD_BYTES
        value: 5242880
      - key: LOG_LEVEL
        value: INFO
      - key: SENTRY_DSN
        sync: false
      - key: SENTRY_ENVIRONMENT
        value: production
      - key: SENTRY_TRACES_SAMPLE_RATE
        value: 0.05
      - key: CORS_ORIGINS
        value: https://hybrid-room-booking.vercel.app
      - key: FRONTEND_BASE_URL
        value: https://hybrid-room-booking.vercel.app
      - key: PUBLIC_API_BASE_URL
        value: https://hybrid-room-booking-api.onrender.com
      - key: EMAIL_FROM
        value: noreply@hybridrooms.local
      - key: EMAIL_PROVIDER
        value: log
      - key: ALLOW_LOG_EMAIL_IN_PRODUCTION
        value: 1
      - key: PAYMENT_PROVIDER
        value: mock
      - key: ALLOW_MOCK_PAYMENTS_IN_PRODUCTION
        value: 1
