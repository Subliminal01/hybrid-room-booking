databases:
  - name: hybrid-room-booking-db
    databaseName: room_booking
    user: room_booking

services:
  - type: web
    name: hybrid-room-booking-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health/ready
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: hybrid-room-booking-db
          property: connectionString
      - key: AUTH_SECRET_KEY
        generateValue: true
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 60
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: 30
      - key: BOOKING_HOLD_MINUTES
        value: 30
      - key: AUTH_RATE_LIMIT_PER_MINUTE
        value: 120
      - key: CORS_ORIGINS
        value: https://hybrid-room-booking.vercel.app
      - key: FRONTEND_BASE_URL
        value: https://hybrid-room-booking.vercel.app
      - key: EMAIL_FROM
        value: noreply@hybridrooms.local
      - key: PAYMENT_PROVIDER
        value: razorpay
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
