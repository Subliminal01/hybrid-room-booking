name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      APP_ENV: test
      DATABASE_URL: sqlite:///./ci.db
      AUTH_SECRET_KEY: ci-only-secret-with-enough-length
      CORS_ORIGINS: http://localhost:3000
      FRONTEND_BASE_URL: http://localhost:3000
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run release check
        run: python scripts/release_check.py

      - name: Run tests
        run: python -m pytest

  migrations:
    name: PostgreSQL migrations
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: room_booking
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d room_booking"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      APP_ENV: test
      DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/room_booking
      AUTH_SECRET_KEY: ci-only-secret-with-enough-length
      CORS_ORIGINS: http://localhost:3000
      FRONTEND_BASE_URL: http://localhost:3000
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Check Alembic heads
        run: python -m alembic heads --verbose

      - name: Apply migrations
        run: python -m alembic upgrade head

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run typecheck
        run: pnpm run typecheck

      - name: Build frontend
        run: pnpm run build

      - name: Smoke test frontend shell
        run: |
          pnpm exec next start -H 127.0.0.1 -p 3000 &
          server_pid=$!
          trap "kill $server_pid" EXIT
          for attempt in {1..30}; do
            if curl -fsS http://127.0.0.1:3000 >/dev/null; then
              break
            fi
            sleep 1
          done
          node scripts/smoke-test.mjs --frontend-url http://127.0.0.1:3000 --skip-backend

  docker:
    name: Docker image builds
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: hybrid-room-booking-backend:ci

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          tags: hybrid-room-booking-frontend:ci
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=http://localhost:8000
